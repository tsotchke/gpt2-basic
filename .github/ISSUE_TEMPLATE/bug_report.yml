name: Bug report
description: Report a reproducible problem in the preview, scripts, or docs.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Release tag, commit SHA, or downloaded asset name.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Commands or DOS steps that reproduce the issue.
      render: shell
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Host OS, Python version, emulator or physical hardware, DOS version, and relevant tools.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste non-sensitive logs or link to evidence files.
      render: text
    validations:
      required: false
